name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  # Triggers the Coolify deployment and waits for it to finish. Only after the
  # build (check) passes, and only on pushes to main.
  deploy:
    name: Deploy (Coolify)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      APP_UUID: g74ubw09wmzn7m1pcmr2aawb
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      SITE_HOST: rainbow-keyboard.teraren.com
    steps:
      - name: Trigger Coolify deployment
        id: trigger
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_BASE_URL:-}" ] || [ -z "${COOLIFY_API_TOKEN:-}" ]; then
            echo "::error::COOLIFY_BASE_URL / COOLIFY_API_TOKEN secrets are not set."
            exit 1
          fi
          base="${COOLIFY_BASE_URL%/}"
          resp=$(curl -fsS "$base/api/v1/deploy?uuid=$APP_UUID" \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN")
          echo "$resp"
          uuid=$(echo "$resp" | jq -r '(.deployments // .data.deployments)[0].deployment_uuid // empty')
          if [ -z "$uuid" ]; then
            echo "::error::Could not parse deployment_uuid from Coolify response."
            exit 1
          fi
          echo "uuid=$uuid" >> "$GITHUB_OUTPUT"

      # Reading the Coolify deployment status needs a token with "read"
      # permission; a deploy-only token cannot. To keep token scope minimal we
      # instead confirm the deploy by polling the site for HTTP 200. A unique
      # query string + no-cache headers bypass the Cloudflare edge so we hit the
      # origin (the new container) rather than a cached copy.
      - name: Wait for the site to be healthy
        run: |
          set -euo pipefail
          echo "Deployment ${{ steps.trigger.outputs.uuid }} triggered; polling origin ..."
          sleep 30  # give Coolify time to build and start the new container
          for i in $(seq 1 60); do
            url="https://$SITE_HOST/?ci=${{ github.run_id }}-$i"
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$url" || echo 000)
            echo "[$i] HTTP $code"
            if [ "$code" = "200" ]; then echo "Origin is healthy."; exit 0; fi
            sleep 10
          done
          echo "::error::Site did not return HTTP 200 within the timeout."
          exit 1

      # Purge only this host's cached objects from the shared teraren.com zone
      # (not purge_everything), so the new deploy is served immediately.
      - name: Purge Cloudflare cache (by host)
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ZONE_ID != '' }}
        run: |
          set -euo pipefail
          echo "Purging Cloudflare cache for host $SITE_HOST ..."
          resp=$(curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"hosts\":[\"$SITE_HOST\"]}")
          echo "$resp"
          if [ "$(echo "$resp" | jq -r '.success')" != "true" ]; then
            echo "::error::Cloudflare purge failed."
            exit 1
          fi
          echo "Purged $SITE_HOST from Cloudflare."

  # Records the deployment to the "production" environment (shown on the repo
  # Deployments page) — only after Coolify reports success.
  production:
    name: Record production deployment
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://rainbow-keyboard.teraren.com
    steps:
      - name: Mark production deployment
        run: echo "Coolify deploy of ${{ github.sha }} verified; recorded to production."
